<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#b5001f" id="tc">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<title>🇯🇵 Japan 2026</title>
<style>
/* ── Design Tokens ── */
:root {
  --bg: #f5f2ef; --bg2: #ede9e4; --card: #fff; --card2: #faf8f6;
  --border: rgba(0,0,0,.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
  --shadow: 0 2px 8px rgba(0,0,0,.08), 0 6px 20px rgba(0,0,0,.05);
  --text: #111; --text2: #444; --text3: #777; --text4: #aaa;
  --acc: #b5001f; --acc-light: #fdeced;
  --hdr: #b5001f; --nav-bg: #fff; --nav-border: rgba(0,0,0,.1);
  --input-bg: #f0ece8; --input-border: #ddd;
  --tip-bg: #fffbf0; --tip-border: #e8d57a; --tip-text: #4a3400;
  --safe-b: env(safe-area-inset-bottom, 16px);
  --safe-t: env(safe-area-inset-top, 0px);
  --nav-h: 56px;
}
[data-dark] {
  --bg: #0e0e0e; --bg2: #171717; --card: #1c1c1c; --card2: #222;
  --border: rgba(255,255,255,.09);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
  --shadow: 0 2px 8px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.3);
  --text: #f0ede8; --text2: #b0ada8; --text3: #666; --text4: #444;
  --acc: #e84060; --acc-light: #2a0a10;
  --hdr: #7a0015; --nav-bg: #1c1c1c; --nav-border: rgba(255,255,255,.1);
  --input-bg: #252020; --input-border: #3a3030;
  --tip-bg: #1a1500; --tip-border: #3a2e00; --tip-text: #c8a840;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: var(--bg); color: var(--text); overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
button { touch-action: manipulation; }

/* ── Header ── */
.hdr { background: var(--hdr); color: #fff; padding: 12px 16px 0; position: sticky; top: 0; z-index: 90; transition: background .25s; }
.hdr-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
.hdr-title { font-size: 19px; font-weight: 700; letter-spacing: -.3px; }
.hdr-sub { font-size: 11px; opacity: .75; margin-bottom: 8px; }
.dm-btn {
  background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3);
  color: #fff; border-radius: 18px; padding: 6px 12px; font-size: 14px;
  cursor: pointer; font-family: inherit; min-height: 34px;
}

/* ── Countdown ── */
.cd { font-size: 12px; font-weight: 500; border-radius: 8px; padding: 6px 10px; margin-bottom: 10px; line-height: 1.4; }
.cd.pre  { background: rgba(255,255,255,.18); color: rgba(255,255,255,.95); }
.cd.act  { background: rgba(255,255,255,.22); color: #fff; }
.cd.done { background: rgba(255,255,255,.14); color: rgba(255,255,255,.8); }
.cd strong { font-weight: 700; }
.prog { height: 3px; background: rgba(255,255,255,.25); border-radius: 2px; margin-top: 5px; overflow: hidden; }
.prog-fill { height: 100%; background: rgba(255,255,255,.85); border-radius: 2px; }

/* ── City Tabs (header) ── */
.city-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; overscroll-behavior-x: contain; }
.city-tabs::-webkit-scrollbar { display: none; }
.ctab {
  background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.3);
  color: rgba(255,255,255,.92); border-radius: 18px; padding: 6px 13px;
  font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer;
  flex-shrink: 0; font-family: inherit; transition: background .15s;
  touch-action: manipulation; min-height: 34px;
}
.ctab.on { background: #fff; color: var(--acc); border-color: #fff; }

/* ── Bottom Nav ── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--nav-bg); border-top: 1px solid var(--nav-border);
  display: flex; padding-bottom: var(--safe-b);
  transition: background .25s, border-color .25s;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 9px 0 5px; cursor: pointer; background: none; border: none;
  font-family: inherit; color: var(--text3); transition: color .15s;
  gap: 2px; touch-action: manipulation; min-height: 44px;
}
.nav-btn.on { color: var(--acc); }
.nav-ico { font-size: 22px; line-height: 1; }
.nav-lbl { font-size: 10px; font-weight: 600; letter-spacing: .01em; }

/* ── Content area ── */
.content { padding-bottom: calc(var(--nav-h) + var(--safe-b)); }
.view { display: none; }
.view.show { display: block; }
.wrap { max-width: 480px; margin: 0 auto; padding: 16px 14px; }

/* ── Overview ── */
.intro-banner {
  background: var(--acc-light); border-left: 3px solid var(--acc);
  border-radius: 0 10px 10px 0; padding: 11px 14px; margin-bottom: 16px;
  font-size: 13px; color: var(--text2); line-height: 1.5;
}
.city-card {
  background: var(--card); border-radius: 14px; border: 1px solid var(--border);
  margin-bottom: 10px; cursor: pointer; display: flex; align-items: center;
  padding: 14px; gap: 12px; box-shadow: var(--shadow);
  transition: transform .12s ease, background .2s; touch-action: manipulation;
  min-height: 72px;
}
.city-card:active { transform: scale(.98); }
.city-dot { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.city-info { flex: 1; min-width: 0; }
.city-name { font-size: 15px; font-weight: 700; }
.city-dates { font-size: 11px; color: var(--text3); margin-top: 2px; }
.city-hotel { font-size: 11px; color: var(--text4); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.city-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 18px; white-space: nowrap; flex-shrink: 0; }
.transit-row { display: flex; align-items: flex-start; gap: 8px; padding: 2px 0 8px 16px; }
.transit-line { width: 1px; height: 18px; background: var(--border); margin-right: 4px; flex-shrink: 0; margin-top: 2px; }
.transit-text { font-size: 11px; color: var(--text3); line-height: 1.5; }

/* ── City Detail ── */
.back-btn {
  display: flex; align-items: center; gap: 6px; font-size: 14px;
  color: var(--acc); font-weight: 600; cursor: pointer; padding: 8px 0 14px;
  touch-action: manipulation; min-height: 44px;
}
.city-hero { border-radius: 14px; padding: 20px 18px; margin-bottom: 16px; color: #fff; }
.hero-emoji { font-size: 36px; margin-bottom: 8px; }
.hero-name { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
.hero-sub { font-size: 12px; opacity: .85; margin-top: 3px; }
.hero-dates { font-size: 13px; opacity: .9; margin-top: 7px; font-weight: 500; }
.hero-hotel { font-size: 12px; opacity: .72; margin-top: 5px; }
.sec-hd { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 8px; }
.sec { margin-bottom: 20px; }
.att-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow-sm); transition: background .2s; }
.att-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.att-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
.tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.tip-card { background: var(--tip-bg); border: 1px solid var(--tip-border); border-radius: 10px; padding: 10px 13px; font-size: 12px; color: var(--tip-text); line-height: 1.6; margin-bottom: 8px; }
.transit-card { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--text2); line-height: 1.6; }

/* ── Currency ── */
.page-hd { font-size: 20px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 2px; }
.page-sub { font-size: 12px; color: var(--text3); margin-bottom: 16px; }
.cur-main { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 18px 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
.cur-field { margin-bottom: 12px; }
.cur-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 5px; }
.cur-input-wrap { display: flex; align-items: center; background: var(--input-bg); border: 1.5px solid transparent; border-radius: 12px; padding: 10px 14px; gap: 8px; transition: border-color .2s; }
.cur-input-wrap:focus-within { border-color: var(--acc); }
.cur-flag { font-size: 20px; line-height: 1; flex-shrink: 0; }
.cur-input { flex: 1; background: none; border: none; font-size: 22px; font-weight: 700; color: var(--text); font-family: inherit; outline: none; width: 100%; min-width: 0; touch-action: manipulation; }
.cur-code { font-size: 13px; font-weight: 700; color: var(--text3); flex-shrink: 0; }
.cur-swap-btn {
  display: flex; align-items: center; justify-content: center; margin: 6px auto;
  width: 44px; height: 44px; background: var(--acc-light); border: 1px solid var(--border);
  border-radius: 50%; cursor: pointer; font-size: 18px; color: var(--acc);
  transition: transform .2s; touch-action: manipulation;
}
.cur-swap-btn:active { transform: rotate(180deg) scale(.9); }
.quick-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.quick-btn {
  flex: 1; min-width: 60px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 4px; font-size: 13px; font-weight: 700;
  color: var(--text); cursor: pointer; font-family: inherit; text-align: center;
  transition: background .15s, transform .1s; touch-action: manipulation; min-height: 44px;
}
.quick-btn:active { transform: scale(.95); }
.ref-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
.ref-hd { padding: 12px 14px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); }
.ref-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-top: 1px solid var(--border); }
.ref-label { font-size: 13px; color: var(--text2); }
.ref-val { font-size: 13px; font-weight: 700; color: var(--acc); }

/* ── Phrases ── */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text3); pointer-events: none; }
.search-inp {
  width: 100%; background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 40px 12px 38px; font-size: 15px;
  color: var(--text); font-family: inherit; outline: none;
  box-shadow: var(--shadow-sm); transition: border-color .2s; min-height: 44px;
}
.search-inp:focus { border-color: var(--acc); }
.search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: var(--bg2); border: none; border-radius: 50%; width: 28px; height: 28px;
  cursor: pointer; font-size: 13px; color: var(--text3);
  display: none; align-items: center; justify-content: center; touch-action: manipulation;
}
.ph-cat-hd { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin: 18px 0 8px; }
.ph-cat-hd:first-child { margin-top: 0; }
.ph-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 7px; display: flex; align-items: flex-start; gap: 10px; box-shadow: var(--shadow-sm); }
.ph-texts { flex: 1; min-width: 0; }
.ph-de { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.ph-jp { font-size: 18px; line-height: 1.4; margin-bottom: 3px; }
.ph-rm { font-size: 11px; color: var(--text3); font-style: italic; }
.ph-actions { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
.play-btn {
  width: 44px; height: 44px; border-radius: 50%; background: var(--acc-light);
  border: 1px solid rgba(0,0,0,.08); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 18px; color: var(--acc);
  transition: background .15s, transform .1s; touch-action: manipulation;
}
.play-btn:active { transform: scale(.9); }
.play-btn.playing { background: var(--acc); color: #fff; }
.copy-btn {
  width: 36px; height: 36px; border-radius: 50%; background: var(--bg2);
  border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 13px; color: var(--text3);
  transition: background .15s; touch-action: manipulation;
}
.copy-btn.copied { background: #e8f5e9; color: #2e7d32; }
.no-results { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; }

/* ── Info ── */
.info-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
.info-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.info-list { list-style: none; }
.info-list li { font-size: 12px; color: var(--text2); line-height: 2.1; display: flex; gap: 6px; }
.info-list li::before { content: "→"; color: var(--acc); flex-shrink: 0; }

/* ── Map ── */
#v-map { position: relative; }
#map-el { width: 100%; min-height: 400px; background: var(--bg2); }
.map-legend {
  position: absolute; bottom: calc(var(--safe-b) + 14px); left: 14px; z-index: 500;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 8px 12px; font-size: 11px; color: var(--text2);
  box-shadow: var(--shadow); pointer-events: none;
}
.legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-row:last-child { margin-bottom: 0; }
.legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,.8); }
.map-popup-btn {
  background: var(--acc, #b5001f); color: #fff; border: none; border-radius: 8px;
  padding: 9px 14px; font-size: 12px; font-weight: 700; width: 100%; cursor: pointer;
  margin-top: 8px; font-family: -apple-system, sans-serif; touch-action: manipulation;
}
.leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 4px 24px rgba(0,0,0,.15) !important; }
.leaflet-popup-content { margin: 12px 14px !important; font-family: -apple-system, sans-serif !important; }

/* ── Notes Setup ── */
.notes-setup { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 18px; text-align: center; box-shadow: var(--shadow); }
.notes-setup-ico { font-size: 48px; margin-bottom: 12px; line-height: 1; }
.notes-setup-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.notes-setup-text { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 16px; }
.setup-steps { text-align: left; background: var(--bg2); border-radius: 12px; padding: 14px 16px; margin-bottom: 4px; }
.setup-step { font-size: 12px; color: var(--text2); line-height: 2.1; display: flex; gap: 8px; }
.setup-step strong { color: var(--acc); flex-shrink: 0; }
.setup-code { font-family: monospace; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 2px 7px; font-size: 11px; color: var(--acc); }
.notes-author-inp {
  width: 100%; background: var(--input-bg); border: 1.5px solid transparent; border-radius: 10px;
  padding: 9px 12px; font-size: 14px; color: var(--text); font-family: inherit; outline: none;
  transition: border-color .2s; min-height: 40px; margin-bottom: 8px;
}
.notes-author-inp:focus { border-color: var(--acc); }
.notes-send-btn {
  width: 100%; background: var(--acc); color: #fff; border: none; border-radius: 10px;
  padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px;
  font-family: inherit; touch-action: manipulation; min-height: 44px; transition: opacity .15s;
}
.notes-send-btn:disabled { opacity: .45; }

/* ── Pinboard ── */
.pinboard-wrap { padding: 14px 12px; }
.pinboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.pinboard-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
.pinboard-actions { display: flex; gap: 8px; align-items: center; }
.pb-icon-btn {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex;
  align-items: center; justify-content: center; touch-action: manipulation;
  transition: background .15s; color: var(--text2);
}
.pb-icon-btn:active { background: var(--bg2); }
.pb-status { font-size: 11px; color: var(--text3); }

/* Add-note sticky */
.sticky-compose {
  background: #fef08a; border-radius: 3px;
  box-shadow: 2px 3px 10px rgba(0,0,0,.22), 0 1px 2px rgba(0,0,0,.1);
  padding: 14px 14px 12px; margin-bottom: 18px; position: relative;
}
.sticky-pin {
  width: 14px; height: 14px; background: #c0392b; border-radius: 50%;
  box-shadow: 0 2px 5px rgba(0,0,0,.35); margin: -4px auto 10px;
}
.sticky-name-inp {
  width: 100%; background: transparent; border: none; border-bottom: 1.5px solid rgba(0,0,0,.2);
  padding: 4px 0 6px; font-size: 13px; font-weight: 700; color: rgba(0,0,0,.7);
  font-family: inherit; outline: none; margin-bottom: 10px;
}
.sticky-name-inp::placeholder { color: rgba(0,0,0,.35); }
.sticky-textarea {
  width: 100%; background: transparent; border: none; font-size: 14px; line-height: 1.7;
  color: rgba(0,0,0,.75); font-family: inherit; outline: none; resize: none;
  min-height: 72px; padding: 0;
}
.sticky-textarea::placeholder { color: rgba(0,0,0,.35); }
.sticky-send-btn {
  width: 100%; background: rgba(0,0,0,.1); border: none; border-radius: 6px;
  padding: 9px; font-size: 13px; font-weight: 700; color: rgba(0,0,0,.65);
  cursor: pointer; margin-top: 10px; font-family: inherit; touch-action: manipulation;
  min-height: 40px; transition: background .15s;
}
.sticky-send-btn:disabled { opacity: .4; }
.sticky-send-btn:active { background: rgba(0,0,0,.18); }

/* Note grid */
.notes-grid { columns: 2; column-gap: 10px; }
.sticky-note {
  break-inside: avoid; border-radius: 3px; padding: 12px 11px 10px;
  box-shadow: 2px 3px 8px rgba(0,0,0,.15), 0 1px 2px rgba(0,0,0,.08);
  margin-bottom: 10px; position: relative; word-break: break-word;
  display: inline-block; width: 100%;
}
.sticky-note:nth-child(4n)   { transform: rotate(1.1deg);  }
.sticky-note:nth-child(4n+1) { transform: rotate(-0.7deg); }
.sticky-note:nth-child(4n+2) { transform: rotate(0.4deg);  }
.sticky-note:nth-child(4n+3) { transform: rotate(-1.3deg); }
.sticky-note-pin { width: 12px; height: 12px; background: #c0392b; border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.3); margin: -2px auto 8px; }
.sticky-note-author { font-size: 11px; font-weight: 700; color: rgba(0,0,0,.5); margin-bottom: 5px; }
.sticky-note-text { font-size: 13px; line-height: 1.55; color: rgba(0,0,0,.78); white-space: pre-wrap; }
.sticky-note-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.sticky-note-time { font-size: 10px; color: rgba(0,0,0,.35); }
.sticky-note-del {
  background: none; border: none; font-size: 16px; color: rgba(0,0,0,.25);
  cursor: pointer; padding: 2px; touch-action: manipulation; line-height: 1;
  transition: color .15s;
}
.sticky-note-del:active { color: rgba(192,57,43,.8); }
.notes-empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
.notes-err { text-align: center; padding: 24px 20px; color: var(--acc); font-size: 13px; }

/* ── Heute Badge ── */
.city-card.heute { border-left: 3px solid var(--acc); }
.heute-badge { display:inline-block; background:var(--acc); color:#fff; font-size:10px; font-weight:700; border-radius:20px; padding:2px 8px; margin-left:6px; vertical-align:middle; letter-spacing:.02em; }

/* ── Hero Actions (Share / Wetter) ── */
.hero-actions { display:flex; gap:8px; padding:10px 16px 0; }
.hero-act-btn { flex:1; background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:10px; padding:9px 10px; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; touch-action:manipulation; min-height:40px; transition:background .15s; }
.hero-act-btn:active { background:rgba(255,255,255,.32); }

/* ── Budget Tracker ── */
.budget-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-top:14px; box-shadow:var(--shadow); }
.budget-hd { font-size:13px; font-weight:800; margin-bottom:10px; }
.budget-add-row { display:flex; gap:6px; margin-bottom:10px; }
.budget-lbl-inp { flex:1; background:var(--input-bg); border:1.5px solid transparent; border-radius:10px; padding:8px 10px; font-size:13px; color:var(--text); font-family:inherit; outline:none; transition:border-color .2s; min-width:0; }
.budget-lbl-inp:focus { border-color:var(--acc); }
.budget-amt-inp { width:72px; background:var(--input-bg); border:1.5px solid transparent; border-radius:10px; padding:8px 8px; font-size:13px; color:var(--text); font-family:inherit; outline:none; transition:border-color .2s; text-align:right; }
.budget-amt-inp:focus { border-color:var(--acc); }
.budget-add-btn { background:var(--acc); color:#fff; border:none; border-radius:10px; padding:8px 12px; font-size:13px; font-weight:700; cursor:pointer; touch-action:manipulation; white-space:nowrap; min-height:40px; }
.budget-list { margin-bottom:4px; }
.budget-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--border); }
.budget-row:last-child { border-bottom:none; }
.budget-row-lbl { flex:1; font-size:13px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.budget-row-amt { font-size:13px; font-weight:700; white-space:nowrap; }
.budget-row-del { background:none; border:none; color:var(--text3); font-size:16px; cursor:pointer; padding:0 2px; touch-action:manipulation; transition:color .15s; }
.budget-row-del:active { color:var(--acc); }
.budget-total-row { display:flex; justify-content:space-between; align-items:center; padding-top:8px; border-top:2px solid var(--border); margin-top:4px; }
.budget-total-lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); }
.budget-total-val { font-size:16px; font-weight:800; color:var(--acc); }
.budget-footer { display:flex; justify-content:flex-end; margin-top:6px; }
.budget-reset-btn { background:none; border:none; color:var(--text3); font-size:11px; cursor:pointer; text-decoration:underline; padding:0; touch-action:manipulation; }
.budget-empty { font-size:13px; color:var(--text3); text-align:center; padding:10px 0 4px; }

/* ── Phrase Favourites ── */
.fav-btn { background:none; border:none; font-size:18px; cursor:pointer; padding:0 2px; touch-action:manipulation; line-height:1; opacity:.4; transition:opacity .15s, transform .15s; }
.fav-btn.on { opacity:1; }
.fav-btn:active { transform:scale(1.3); }
.ph-cat-hd.fav-hd { border-left:3px solid #f59e0b; padding-left:8px; }

/* ── Reduced Motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: .01ms !important; animation-duration: .01ms !important; }
}

/* ── Utilities ── */
.hidden { display: none !important; }
</style>

<!-- ═══ Header ═══ -->
<header class="hdr" id="hdr">

    <span class="hdr-title">🇯🇵 Japan 2026</span>

</header>

<!-- ═══ Content ═══ -->
<main class="content">

  <!-- Reise -->
  <div class="view show" id="v-reise" role="tabpanel">
    <div id="v-ov" class="wrap"></div>
    <div id="v-ci" class="wrap hidden"></div>
  </div>

  <!-- Karte -->
  <div class="view" id="v-map" role="tabpanel">
    <div id="map-el" aria-label="Interaktive Reisekarte Japan"></div>
    <div class="map-legend" aria-hidden="true">

      <div class="legend-row"><span class="legend-dot" style="background:#e91e63"></span>★ Highlight</div>

      <div class="legend-row"><span style="color:var(--acc);font-weight:700;font-size:13px">— —</span>&nbsp;Route</div>
    </div>
  </div>

  <!-- Währung -->
  <div class="view" id="v-cur" role="tabpanel">
    <div class="wrap">
      <div class="page-hd">Währungsrechner</div>
      <div class="page-sub">CHF ↔ JPY · Richtwert 2026</div>
      <div class="cur-main">
        <div class="cur-field">
          <div class="cur-label">Schweizer Franken</div>
          <div class="cur-input-wrap">
            <span class="cur-flag" aria-hidden="true">🇨🇭</span>
            <input class="cur-input" id="chf-i" type="number" placeholder="0"
              inputmode="decimal" oninput="cvCHF()" aria-label="CHF Betrag">
            <span class="cur-code" aria-hidden="true">CHF</span>
          </div>
        </div>
        <button class="cur-swap-btn" onclick="swapCur()" aria-label="Währungen tauschen">⇅</button>
        <div class="cur-field">
          <div class="cur-label">Japanischer Yen</div>
          <div class="cur-input-wrap">
            <span class="cur-flag" aria-hidden="true">🇯🇵</span>
            <input class="cur-input" id="jpy-i" type="number" placeholder="0"
              inputmode="decimal" oninput="cvJPY()" aria-label="JPY Betrag">
            <span class="cur-code" aria-hidden="true">¥</span>
          </div>
        </div>
        <div class="quick-row" id="quick-row"></div>
      </div>
      <div class="ref-card" id="ref-card"></div>
      <div class="budget-box">
        <div class="budget-hd">💰 Ausgaben heute</div>
        <div class="budget-add-row">
          <input class="budget-lbl-inp" id="b-lbl" type="text" placeholder="Bezeichnung" maxlength="30" autocomplete="off">
          <input class="budget-amt-inp" id="b-amt" type="number" placeholder="CHF" inputmode="decimal" min="0">
          <button class="budget-add-btn" onclick="addBudget()" aria-label="Ausgabe hinzufügen">+</button>
        </div>
        <div class="budget-list" id="budget-list"></div>
        <div class="budget-total-row">
          <span class="budget-total-lbl">Total heute</span>
          <span class="budget-total-val" id="budget-total">0.00 CHF</span>
        </div>
        <div class="budget-footer">
          <button class="budget-reset-btn" onclick="resetBudget()">Tag zurücksetzen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Phrasen -->
  <div class="view" id="v-ph" role="tabpanel">
    <div class="wrap">
      <div class="page-hd">Japanische Phrasen</div>
      <div class="page-sub">🔊 Tippen = Abspielen &nbsp;·&nbsp; 📋 = Kopieren</div>
      <div class="search-wrap">
        <span class="search-ico" aria-hidden="true">🔍</span>

          aria-label="Suche leeren">✕</button>
      </div>
      <div id="ph-list" role="list"></div>
    </div>
  </div>

  <!-- Infos -->
  <div class="view" id="v-info" role="tabpanel">
    <div class="wrap" id="v-info-content"></div>
  </div>

  <!-- Notizen -->
  <div class="view" id="v-notes" role="tabpanel">
    <div class="wrap" id="v-notes-content"></div>
  </div>

</main>

function applyDM() {
  document.documentElement.toggleAttribute('data-dark', dm);
  document.getElementById('dm-btn').textContent = dm ? '☀️' : '🌙';
  document.getElementById('tc').content = dm ? '#7a0015' : '#b5001f';
  if (tileLayer && mapObj) {
    mapObj.removeLayer(tileLayer);
    tileLayer = addTiles();
  }
}
function toggleDM() {
  dm = !dm;
  localStorage.setItem('dm', dm ? '1' : '0');
  applyDM();
}

function getCurrentCity() {
  var now = new Date();
  var keys = Object.keys(CITY_DATES);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (now >= new Date(CITY_DATES[k][0]) && now < new Date(CITY_DATES[k][1])) {
      return C.find(function (c) { return c.k === k; }) || null;

}

// ═══════════════════════════════════════════════════════════════
// Phrase Favourites
// ═══════════════════════════════════════════════════════════════
var phFavs = (function () {
  try { return JSON.parse(localStorage.getItem('ph-favs') || '[]'); } catch (e) { return []; }
})();

function isFav(jp) { return phFavs.some(function (f) { return f.jp === jp; }); }

function toggleFav(de, jp, rm) {
  var idx = phFavs.findIndex(function (f) { return f.jp === jp; });
  if (idx >= 0) phFavs.splice(idx, 1); else phFavs.push({ de: de, jp: jp, rm: rm });
  localStorage.setItem('ph-favs', JSON.stringify(phFavs));
  renderPH(buildPHList(document.getElementById('search-inp').value.trim()));
}

var synth = window.speechSynthesis;
var curBtn = null;

function speak(text, btn) {
  if (synth.speaking) synth.cancel();
  if (curBtn && curBtn !== btn) { curBtn.classList.remove('playing'); curBtn.textContent = '🔊'; }
  if (curBtn === btn && !synth.speaking) { curBtn = null; return; }
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.8; u.pitch = 1.0;
  btn.classList.add('playing'); btn.textContent = '⏸'; curBtn = btn;
  u.onend = u.onerror = function () { btn.classList.remove('playing'); btn.textContent = '🔊'; curBtn = null; };
  synth.speak(u);
  if (navigator.vibrate) navigator.vibrate(8);
}

function copyTxt(text, btn) {
  var done = function () {
    btn.textContent = '✓'; btn.classList.add('copied');
    if (navigator.vibrate) navigator.vibrate(10);
    setTimeout(function () { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(done).catch(done); }
  else { try { var t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); } catch (e) {} done(); }
}

function renderPH(list) {
  var el = document.getElementById('ph-list');
  if (!list.length) { el.innerHTML = '<div class="no-results">Keine Treffer – probiere einen anderen Begriff</div>'; return; }
  var html = '';
  list.forEach(function (item, idx) {
    if (item.isHd) { html += '<div class="ph-cat-hd' + (item.isFavHd ? ' fav-hd' : '') + '">' + item.cat + '</div>'; return; }
    var id = 'ph' + idx;
    var jp = item.jp.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    var favOn = isFav(item.jp);
    var de2 = item.de.replace(/'/g, "\\'"), rm2 = item.rm.replace(/'/g, "\\'");
    html += '<div class="ph-card" role="listitem">' +
      '<button class="fav-btn' + (favOn ? ' on' : '') + '" onclick="toggleFav(\'' + de2 + '\',\'' + jp + '\',\'' + rm2 + '\')" aria-label="Favorit">' + (favOn ? '★' : '☆') + '</button>' +
      '<div class="ph-texts">' +
        '<div class="ph-de">' + item.de + '</div>' +
        '<div class="ph-jp">' + item.jp + '</div>' +
        '<div class="ph-rm">' + item.rm + '</div>' +
      '</div>' +
      '<div class="ph-actions">' +
        '<button class="play-btn" id="pb' + id + '" onclick="speak(\'' + jp + '\',this)" aria-label="' + item.de + ' auf Japanisch abspielen">🔊</button>' +
        '<button class="copy-btn" id="cb' + id + '" onclick="copyTxt(\'' + jp + '\',this)" aria-label="Japanischen Text kopieren">📋</button>' +
      '</div>' +
      '</div>';
  });
  el.innerHTML = html;
}

function buildPHList(q) {
  var items = [];
  if (!q && phFavs.length) {
    items.push({ isHd: true, cat: '★ Favoriten', isFavHd: true });
    phFavs.forEach(function (p) { items.push(p); });
  }
  PH.forEach(function (cat) {
    var filtered = cat.ph.filter(function (p) {
      if (!q) return true;
      var lq = q.toLowerCase();
      return p.de.toLowerCase().includes(lq) || p.jp.includes(q) || p.rm.toLowerCase().includes(lq);
    });
    if (filtered.length) {
      if (!q) items.push({ isHd: true, cat: cat.cat });
      filtered.forEach(function (p) { items.push(p); });
    }
  });
  return items;
}
renderPH(buildPHList(''));

function filterPh() {
  var q = document.getElementById('search-inp').value.trim();
  document.getElementById('search-clear').style.display = q ? 'flex' : 'none';
  if (synth.speaking) { synth.cancel(); if (curBtn) { curBtn.classList.remove('playing'); curBtn.textContent = '🔊'; curBtn = null; } }
  renderPH(buildPHList(q));
}
function clearSearch() {
  document.getElementById('search-inp').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderPH(buildPHList(''));
}

var mapObj = null;
var tileLayer = null;

var TILE_LIGHT = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
var TILE_DARK  = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
var TILE_ATTR  = '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>';

function addTiles() {
  return L.tileLayer(dm ? TILE_DARK : TILE_LIGHT, { attribution: TILE_ATTR, maxZoom: 19 }).addTo(mapObj);
}

function resizeMap() {
  var hdr = document.getElementById('hdr').offsetHeight;
  var nav = document.querySelector('.nav').offsetHeight;
  document.getElementById('map-el').style.height = (window.innerHeight - hdr - nav) + 'px';
  if (mapObj) mapObj.invalidateSize();
}

function initMap() {
  resizeMap();
  if (mapObj) { mapObj.invalidateSize(); return; }

  mapObj = L.map('map-el', { zoomControl: false, tap: false });
  L.control.zoom({ position: 'topright' }).addTo(mapObj);
  tileLayer = addTiles();

  // Route line
  L.polyline(C.map(function (c) { return c.ll; }), {
    color: '#b5001f', weight: 2.5, dashArray: '7,10', opacity: 0.7
  }).addTo(mapObj);

  // Attraction layer (visible at zoom >= 11)
  var attLayer = L.layerGroup().addTo(mapObj);

  C.forEach(function (c) {
    // City circle
    var cm = L.circleMarker(c.ll, { radius: 13, fillColor: c.col, color: '#fff', weight: 2.5, fillOpacity: 0.93 }).addTo(mapObj);

    // City label chip
    L.marker(c.ll, {
      icon: L.divIcon({
        html: '<div style="background:' + c.col + ';color:#fff;border-radius:14px;padding:3px 9px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3);margin-left:20px;margin-top:-9px">' + c.e + ' ' + c.n + '</div>',
        className: '', iconAnchor: [0, 0]
      })
    }).addTo(mapObj);

    // City popup – correct navigation handler
    cm.bindPopup(
      '<div style="min-width:175px;font-family:-apple-system,sans-serif">' +
      '<div style="font-size:15px;font-weight:700;margin-bottom:3px">' + c.e + ' ' + c.n + '</div>' +
      '<div style="font-size:11px;color:#666;margin-bottom:2px">📅 ' + c.d + ' · ' + c.ni + '</div>' +
      '<div style="font-size:11px;color:#888;margin-bottom:10px">🏨 ' + c.h + '</div>' +
      '<button class="map-popup-btn" onclick="showMain(\'reise\');openCity(\'' + c.k + '\')">Details ansehen →</button>' +
      '</div>'
    );

    // Attraction pins
    c.a.forEach(function (a) {
      if (!a.ll) return;
      var hi = a.t.indexOf('★') >= 0;
      L.circleMarker(a.ll, {
        radius: hi ? 7 : 5, fillColor: hi ? '#e91e63' : '#607d8b',
        color: '#fff', weight: 1.5, fillOpacity: 0, opacity: 0
      }).addTo(attLayer).bindPopup(
        '<div style="font-family:-apple-system,sans-serif">' +
        '<div style="font-size:12px;font-weight:700;margin-bottom:3px">' + a.n + '</div>' +
        '<div style="font-size:11px;color:#555;line-height:1.5">' + a.d + '</div></div>'
      );
    });
  });

  function updateAttVis() {
    var z = mapObj.getZoom();
    var show = z >= 11;
    attLayer.eachLayer(function (l) {
      l.setStyle({ fillOpacity: show ? (l.options.fillColor === '#e91e63' ? 0.9 : 0.7) : 0, opacity: show ? 1 : 0 });
    });
  }
  mapObj.on('zoomend', updateAttVis);
  mapObj.fitBounds(L.latLngBounds(C.map(function (c) { return c.ll; })), { padding: [40, 40] });
}

window.addEventListener('resize', function () { if (curMain === 'map') resizeMap(); });

// ═══════════════════════════════════════════════════════════════
// Notes – JSONBin.io REST (kein Code-Editieren nötig)
// ═══════════════════════════════════════════════════════════════
var JB_BASE = 'https://api.jsonbin.io/v3/b/';
var JB_BIN  = '6a0ab1b7c0954111d83d5a8e';
var JB_KEY  = '$2a$10$C3e0SSQnFmDclZu7VI2iQulahkWQKMI6ub1ftEyUiLFR5kXSYR6Gm';

var notesInitialized = false;
var notesPoll = null;

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function getJBCreds() {
  return { binId: JB_BIN, key: JB_KEY };
}

function initNotes() {
  if (!notesInitialized) {
    notesInitialized = true;
    renderNotesShell();
  }
  loadNotes();
  clearInterval(notesPoll);
  notesPoll = setInterval(function () {
    if (curMain === 'notes') loadNotes(); else clearInterval(notesPoll);
  }, 20000);
}

var STICKY_COLORS = ['#fef08a','#f9a8d4','#93c5fd','#86efac','#fdba74','#c4b5fd'];

function stickyColor(id) {
  var h = 0;
  for (var i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) & 0xffff;
  return STICKY_COLORS[h % STICKY_COLORS.length];
}

function renderNotesShell() {
  var author = escHtml(localStorage.getItem('notes-author') || '');
  var c = document.getElementById('v-notes-content');
  c.innerHTML =
    '<div class="pinboard-wrap">' +
      '<div class="pinboard-header">' +
        '<span class="pinboard-title">Pinboard</span>' +
        '<div class="pinboard-actions">' +
          '<span class="pb-status" id="notes-status"></span>' +
          '<button class="pb-icon-btn" onclick="loadNotes()" aria-label="Aktualisieren" title="Aktualisieren">↻</button>' +
        '</div>' +
      '</div>' +
      '<div class="sticky-compose">' +
        '<div class="sticky-pin"></div>' +
        '<input class="sticky-name-inp" id="notes-author" type="text" placeholder="Dein Name" value="' + author + '" maxlength="24" autocomplete="off" spellcheck="false">' +
        '<textarea class="sticky-textarea" id="notes-text" placeholder="Idee oder Notiz…" maxlength="500" rows="3"></textarea>' +
        '<button class="sticky-send-btn" onclick="addNote()" id="notes-send-btn">Anpinnen</button>' +
      '</div>' +
      '<div id="notes-list" class="notes-grid" aria-live="polite"></div>' +
    '</div>';
}

function saveJBCreds() {
  var binId = (document.getElementById('setup-bin') || {}).value.trim();
  var key   = (document.getElementById('setup-key') || {}).value.trim();
  if (!binId || !key) return;
  localStorage.setItem('jb-bin', binId);
  localStorage.setItem('jb-key', key);
  notesInitialized = false;
  initNotes();
}

function resetJBCreds() {
  localStorage.removeItem('jb-bin');
  localStorage.removeItem('jb-key');
  notesInitialized = false;
  clearInterval(notesPoll);
  renderNotesShell({ binId: '', key: '' });
}

function loadNotes() {
  var creds = getJBCreds();
  if (!creds.binId || !creds.key) return;
  fetch(JB_BASE + creds.binId + '/latest', { headers: { 'X-Master-Key': creds.key } })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var notes = (data.record && Array.isArray(data.record.notes)) ? data.record.notes : [];
      notes.sort(function (a, b) { return b.ts - a.ts; });
      var list = document.getElementById('notes-list');
      if (!list) return;
      var myName = (document.getElementById('notes-author') || {}).value ||
                   localStorage.getItem('notes-author') || '';
      if (notes.length === 0) {
        list.innerHTML = '<div class="notes-empty" style="grid-column:1/-1">Noch keine Notizen – sei die erste!</div>';
      } else {
        list.innerHTML = notes.map(function (n) {
          var d = new Date(n.ts);
          var ds = d.toLocaleDateString('de-CH', { day: '2-digit', month: '2-digit' }) + ' ' +
                   d.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
          var own = myName && n.author === myName;
          var bg = stickyColor(n.id || String(n.ts));
          return '<div class="sticky-note" style="background:' + bg + '">' +
            '<div class="sticky-note-pin"></div>' +
            '<div class="sticky-note-author">' + escHtml(n.author || 'Anonym') + '</div>' +
            '<div class="sticky-note-text">' + escHtml(n.text) + '</div>' +
            '<div class="sticky-note-footer">' +
              '<span class="sticky-note-time">' + ds + '</span>' +
              (own ? '<button class="sticky-note-del" data-del="' + escHtml(n.id) + '" onclick="deleteNote(\'' + escHtml(n.id) + '\')" aria-label="Löschen" title="Löschen">×</button>' : '') +
            '</div>' +
          '</div>';
        }).join('');
      }
      var st = document.getElementById('notes-status');
      if (st) st.textContent = new Date().toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
    })
    .catch(function () {
      var list = document.getElementById('notes-list');
      if (list) list.innerHTML = '<div class="notes-err">Verbindungsfehler – Netz oder Key prüfen.</div>';
    });
}

function addNote() {
  var creds = getJBCreds();
  if (!creds.binId || !creds.key) return;
  var authorEl = document.getElementById('notes-author');
  var textEl   = document.getElementById('notes-text');
  var author   = authorEl.value.trim();
  var text     = textEl.value.trim();
  if (!author) { authorEl.focus(); return; }
  if (!text)   { textEl.focus();   return; }
  localStorage.setItem('notes-author', author);
  var btn = document.getElementById('notes-send-btn');
  if (btn) btn.disabled = true;
  fetch(JB_BASE + creds.binId + '/latest', { headers: { 'X-Master-Key': creds.key } })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var notes = (data.record && Array.isArray(data.record.notes)) ? data.record.notes : [];
      notes.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,5), author: author, text: text, ts: Date.now() });
      return fetch(JB_BASE + creds.binId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': creds.key },
        body: JSON.stringify({ notes: notes })
      });
    })
    .then(function () {
      textEl.value = '';
      if (btn) btn.disabled = false;
      if (navigator.vibrate) navigator.vibrate(40);
      loadNotes();
    })
    .catch(function () { if (btn) btn.disabled = false; });
}

function deleteNote(id) {
  var creds = getJBCreds();
  if (!creds.binId || !creds.key) return;
  // Inline confirmation: tap once → show '?', tap again → delete
  var btn = document.querySelector('[data-del="' + id + '"]');
  if (btn && !btn.dataset.confirm) {
    btn.dataset.confirm = '1';
    btn.textContent = '?';
    btn.style.color = '#c0392b';
    btn.style.fontWeight = '700';
    setTimeout(function () {
      if (btn && btn.dataset.confirm) {
        delete btn.dataset.confirm;
        btn.textContent = '×';
        btn.style.color = '';
        btn.style.fontWeight = '';
      }
    }, 2500);
    return;
  }
  fetch(JB_BASE + creds.binId + '/latest', { headers: { 'X-Master-Key': creds.key } })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var notes = (data.record && Array.isArray(data.record.notes)) ? data.record.notes : [];
      notes = notes.filter(function (n) { return n.id !== id; });
      return fetch(JB_BASE + creds.binId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': creds.key },
        body: JSON.stringify({ notes: notes })
      });
    })
    .then(function () { loadNotes(); });
}

// ═══════════════════════════════════════════════════════════════
// Budget Tracker
// ═══════════════════════════════════════════════════════════════
var BUDGET_DAY = 'budget-' + new Date().toDateString();

function getBudget() {
  try { return JSON.parse(localStorage.getItem(BUDGET_DAY) || '[]'); } catch (e) { return []; }
}

function renderBudget() {
  var entries = getBudget();
  var total = entries.reduce(function (s, e) { return s + e.chf; }, 0);
  var list = document.getElementById('budget-list');
  var totEl = document.getElementById('budget-total');
  if (!list || !totEl) return;
  if (!entries.length) {
    list.innerHTML = '<div class="budget-empty">Noch keine Ausgaben heute</div>';
  } else {
    list.innerHTML = entries.map(function (e, i) {
      return '<div class="budget-row">' +
        '<span class="budget-row-lbl">' + escHtml(e.lbl) + '</span>' +
        '<span class="budget-row-amt">' + e.chf.toFixed(2) + ' CHF</span>' +
        '<button class="budget-row-del" onclick="delBudget(' + i + ')" aria-label="Löschen">×</button>' +
      '</div>';
    }).join('');
  }
  totEl.textContent = total.toFixed(2) + ' CHF · ' + Math.round(total * RATE).toLocaleString('de') + ' ¥';
}

function addBudget() {
  var lbl = (document.getElementById('b-lbl').value.trim()) || 'Ausgabe';
  var amt = parseFloat(document.getElementById('b-amt').value);
  if (isNaN(amt) || amt <= 0) { document.getElementById('b-amt').focus(); return; }
  var entries = getBudget();
  entries.push({ lbl: lbl, chf: amt });
  localStorage.setItem(BUDGET_DAY, JSON.stringify(entries));
  document.getElementById('b-lbl').value = '';
  document.getElementById('b-amt').value = '';
  if (navigator.vibrate) navigator.vibrate(8);
  renderBudget();
}

function delBudget(i) {
  var entries = getBudget();
  entries.splice(i, 1);
  localStorage.setItem(BUDGET_DAY, JSON.stringify(entries));
  renderBudget();
}

function resetBudget() {
  localStorage.removeItem(BUDGET_DAY);
  renderBudget();
}

renderBudget();

function shareCity(k) {

  if (!c || !navigator.share) return;
  navigator.share({
    title: 'Japan 2026 – ' + c.n,
    text: c.d + '\n' + c.a.slice(0, 3).map(function (a) { return '• ' + a.n; }).join('\n'),
    url: 'https://jaayy46.github.io/japan-reise-2026/'
  }).catch(function () {});
}

// ═══════════════════════════════════════════════════════════════
// Swipe Navigation
// ═══════════════════════════════════════════════════════════════
(function () {
  var tx = 0, ty = 0;
  var content = document.querySelector('.content');
  content.addEventListener('touchstart', function (e) {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, { passive: true });
  content.addEventListener('touchend', function (e) {
    var dx = e.changedTouches[0].clientX - tx;
    var dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    var idx = SECTIONS.indexOf(curMain);
    if (dx < 0 && idx < SECTIONS.length - 1) showMain(SECTIONS[idx + 1]);
    else if (dx > 0 && idx > 0) showMain(SECTIONS[idx - 1]);
  }, { passive: true });
})();
