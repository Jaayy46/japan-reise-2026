<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#b5001f" id="tc">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<title>🇯🇵 Japan 2026</title>
<style>
:root{
  --bg:#f5f2ef;--bg2:#ede9e4;--card:#fff;--card2:#faf8f6;
  --border:rgba(0,0,0,.08);--shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --text:#111;--text2:#444;--text3:#777;--text4:#aaa;
  --acc:#b5001f;--acc2:#d4002b;--acc-light:#fdeced;
  --hdr:#b5001f;--nav-bg:#fff;--nav-border:rgba(0,0,0,.1);
  --input-bg:#f0ece8;--input-border:#ddd;
  --tip-bg:#fffbf0;--tip-border:#e8d57a;--tip-text:#4a3400;
  --tag-hi-bg:#fce4ec;--tag-hi-c:#880e4f;
  --tag-free-bg:#e8f5e9;--tag-free-c:#2e7d32;
  --tag-pay-bg:#fff3e0;--tag-pay-c:#bf360c;
  --tag-eve-bg:#ede7f6;--tag-eve-c:#4527a0;
  --tag-ex-bg:#e3f2fd;--tag-ex-c:#0d47a1;
  --safe-bottom:env(safe-area-inset-bottom,16px);
}
[data-dark]{
  --bg:#0e0e0e;--bg2:#171717;--card:#1c1c1c;--card2:#222;
  --border:rgba(255,255,255,.08);--shadow:0 1px 4px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
  --text:#f0ede8;--text2:#b0ada8;--text3:#666;--text4:#444;
  --acc:#e84060;--acc2:#ff4d6a;--acc-light:#2a0a10;
  --hdr:#7a0015;--nav-bg:#1c1c1c;--nav-border:rgba(255,255,255,.1);
  --input-bg:#252020;--input-border:#3a3030;
  --tip-bg:#1a1600;--tip-border:#3a2e00;--tip-text:#c8a840;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* ── Header ── */
.hdr{background:var(--hdr);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:90;transition:background .2s}
.hdr-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.hdr-title{font-size:19px;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-size:11px;opacity:.75;margin-bottom:8px}
.dm-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:18px;padding:4px 10px;font-size:14px;cursor:pointer;font-family:inherit}

/* ── Countdown ── */
.cd{font-size:12px;font-weight:500;border-radius:8px;padding:6px 10px;margin-bottom:10px;line-height:1.4;transition:background .2s,color .2s}
.cd.pre{background:rgba(255,255,255,.18);color:rgba(255,255,255,.95)}
.cd.act{background:rgba(255,255,255,.22);color:#fff}
.cd.done{background:rgba(255,255,255,.14);color:rgba(255,255,255,.8)}
.cd strong{font-weight:700}
.prog{height:3px;background:rgba(255,255,255,.25);border-radius:2px;margin-top:5px;overflow:hidden}
.prog-fill{height:100%;background:rgba(255,255,255,.85);border-radius:2px}

/* ── City tabs in header ── */
.city-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.city-tabs::-webkit-scrollbar{display:none}
.ctab{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.92);border-radius:18px;padding:5px 12px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;flex-shrink:0;font-family:inherit;transition:background .15s}
.ctab.on{background:#fff;color:var(--acc);border-color:#fff}

/* ── Bottom Nav ── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--nav-bg);border-top:1px solid var(--nav-border);display:flex;padding-bottom:var(--safe-bottom);transition:background .2s,border-color .2s}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 4px;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--text3);transition:color .15s;gap:2px}
.nav-btn.on{color:var(--acc)}
.nav-ico{font-size:22px;line-height:1}
.nav-lbl{font-size:10px;font-weight:600}

/* ── Content ── */
.content{padding-bottom:calc(66px + var(--safe-bottom))}
.view{display:none}
.view.show{display:block}
.wrap{max-width:480px;margin:0 auto;padding:16px 14px}

/* ── Overview ── */
.intro-banner{background:var(--acc-light);border-left:3px solid var(--acc);border-radius:0 10px 10px 0;padding:11px 14px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.5}
[data-dark] .intro-banner{color:var(--text2)}
.city-card{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;cursor:pointer;overflow:hidden;display:flex;align-items:center;padding:14px 14px;gap:12px;box-shadow:var(--shadow);transition:transform .1s,background .2s}
.city-card:active{transform:scale(.98)}
.city-dot{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.city-info{flex:1;min-width:0}
.city-name{font-size:15px;font-weight:700}
.city-dates{font-size:11px;color:var(--text3);margin-top:2px}
.city-hotel{font-size:11px;color:var(--text4);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.city-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:18px;white-space:nowrap;flex-shrink:0}
.transit-row{display:flex;align-items:flex-start;gap:8px;padding:2px 0 8px 16px}
.transit-line{width:1px;height:18px;background:var(--border);margin-right:4px;flex-shrink:0;margin-top:2px}
.transit-text{font-size:11px;color:var(--text3);line-height:1.5}

/* ── City Detail ── */
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--acc);font-weight:600;cursor:pointer;padding:6px 0 12px}
.city-hero{border-radius:14px;padding:20px 18px;margin-bottom:16px;color:#fff}
.hero-emoji{font-size:36px;margin-bottom:8px}
.hero-name{font-size:26px;font-weight:800;letter-spacing:-.5px}
.hero-sub{font-size:12px;opacity:.85;margin-top:3px}
.hero-dates{font-size:13px;opacity:.9;margin-top:7px;font-weight:500}
.hero-hotel{font-size:12px;opacity:.72;margin-top:5px}
.sec-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:8px}
.sec{margin-bottom:20px}
.att-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:background .2s}
.att-name{font-size:14px;font-weight:700;margin-bottom:3px}
.att-desc{font-size:12px;color:var(--text2);line-height:1.6}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.tip-card{background:var(--tip-bg);border:1px solid var(--tip-border);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--tip-text);line-height:1.6;margin-bottom:8px;transition:background .2s,border-color .2s}
.transit-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.6;transition:background .2s}

/* ── Currency ── */
.cur-wrap{max-width:480px;margin:0 auto;padding:16px 14px}
.page-hd{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:2px}
.page-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.cur-main{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:18px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
.cur-field{margin-bottom:12px}
.cur-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px}
.cur-input-wrap{display:flex;align-items:center;background:var(--input-bg);border:1.5px solid transparent;border-radius:12px;padding:10px 14px;gap:8px;transition:border-color .2s}
.cur-input-wrap:focus-within{border-color:var(--acc)}
.cur-flag{font-size:20px;line-height:1;flex-shrink:0}
.cur-input{flex:1;background:none;border:none;font-size:22px;font-weight:700;color:var(--text);font-family:inherit;outline:none;width:100%;min-width:0}
.cur-code{font-size:13px;font-weight:700;color:var(--text3);flex-shrink:0}
.cur-swap-btn{display:flex;align-items:center;justify-content:center;margin:6px auto;width:36px;height:36px;background:var(--acc-light);border:1px solid var(--border);border-radius:50%;cursor:pointer;font-size:16px;color:var(--acc);transition:transform .2s}
.cur-swap-btn:active{transform:rotate(180deg) scale(.9)}
.quick-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.quick-btn{flex:1;min-width:60px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 4px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit;text-align:center;transition:background .15s,transform .1s}
.quick-btn:active{transform:scale(.95)}
.ref-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.ref-hd{padding:12px 14px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.ref-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:1px solid var(--border)}
.ref-label{font-size:13px;color:var(--text2)}
.ref-val{font-size:13px;font-weight:700;color:var(--acc)}

/* ── Phrases ── */
.ph-wrap{max-width:480px;margin:0 auto;padding:16px 14px}
.search-wrap{position:relative;margin-bottom:14px}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
.search-inp{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:11px 12px 11px 38px;font-size:14px;color:var(--text);font-family:inherit;outline:none;box-shadow:var(--shadow);transition:border-color .2s}
.search-inp:focus{border-color:var(--acc)}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--bg2);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;color:var(--text3);display:none;align-items:center;justify-content:center}
.ph-cat-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin:16px 0 8px}
.ph-cat-hd:first-child{margin-top:0}
.ph-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:background .2s}
.ph-texts{flex:1;min-width:0}
.ph-de{font-size:13px;font-weight:600;margin-bottom:4px}
.ph-jp{font-size:18px;line-height:1.4;margin-bottom:3px}
.ph-rm{font-size:11px;color:var(--text3);font-style:italic}
.ph-actions{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
.play-btn{width:36px;height:36px;border-radius:50%;background:var(--acc-light);border:1px solid rgba(0,0,0,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--acc);transition:background .15s,transform .1s;flex-shrink:0}
.play-btn:active{transform:scale(.9)}
.play-btn.playing{background:var(--acc);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.copy-btn{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);transition:background .15s}
.copy-btn.copied{background:var(--tag-free-bg);color:var(--tag-free-c)}
.no-results{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}

/* ── Info ── */
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);transition:background .2s}
.info-title{font-size:14px;font-weight:700;margin-bottom:10px}
.info-list{list-style:none}
.info-list li{font-size:12px;color:var(--text2);line-height:2;display:flex;gap:6px}
.info-list li::before{content:"→";color:var(--acc);flex-shrink:0}

.hidden{display:none!important}

/* ── Map ── */
#v-map{position:relative}
#map-el{width:100%;min-height:400px;background:var(--bg2)}
.map-legend{position:absolute;bottom:calc(var(--safe-bottom) + 12px);left:12px;z-index:500;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 11px;font-size:11px;color:var(--text2);box-shadow:var(--shadow);pointer-events:none}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.legend-row:last-child{margin-bottom:0}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.8)}
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 4px 20px rgba(0,0,0,.18)!important;border:1px solid rgba(0,0,0,.06)!important}
.leaflet-popup-content{margin:12px 14px!important;font-family:-apple-system,BlinkMacSystemFont,sans-serif!important}
.map-popup-btn{background:#b5001f;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;width:100%;cursor:pointer;margin-top:8px;font-family:inherit}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr" id="hdr">
  <div class="hdr-row1">
    <span class="hdr-title">🇯🇵 Japan 2026</span>
    <button class="dm-btn" id="dm-btn" onclick="toggleDM()">🌙</button>
  </div>
  <div class="hdr-sub">20. Juli – 5. August · 6 Stationen</div>
  <div id="cd" class="cd pre"></div>
  <div id="city-tabs-bar" class="city-tabs hidden"></div>
</div>

<!-- Content -->
<div class="content">
  <!-- Reise View -->
  <div class="view show" id="v-reise">
    <div id="v-ov" class="wrap"></div>
    <div id="v-ci" class="wrap hidden"></div>
  </div>

  <!-- Währung View -->
  <div class="view" id="v-cur">
    <div class="cur-wrap">
      <div class="page-hd">💴 Währungsrechner</div>
      <div class="page-sub">CHF ↔ JPY · Richtwert 2026</div>
      <div class="cur-main">
        <div class="cur-field">
          <div class="cur-label">Schweizer Franken</div>
          <div class="cur-input-wrap">
            <span class="cur-flag">🇨🇭</span>
            <input class="cur-input" id="chf-i" type="number" placeholder="0" inputmode="decimal" oninput="cvCHF()">
            <span class="cur-code">CHF</span>
          </div>
        </div>
        <button class="cur-swap-btn" onclick="swapCur()" title="Tauschen">⇅</button>
        <div class="cur-field">
          <div class="cur-label">Japanischer Yen</div>
          <div class="cur-input-wrap">
            <span class="cur-flag">🇯🇵</span>
            <input class="cur-input" id="jpy-i" type="number" placeholder="0" inputmode="decimal" oninput="cvJPY()">
            <span class="cur-code">JPY</span>
          </div>
        </div>
        <div class="quick-row" id="quick-row"></div>
      </div>
      <div class="ref-card" id="ref-card"></div>
    </div>
  </div>

  <!-- Phrasen View -->
  <div class="view" id="v-ph">
    <div class="ph-wrap">
      <div class="page-hd">🗣️ Phrasen</div>
      <div class="page-sub" style="margin-bottom:12px">Tippen zum Abspielen · Langes Tippen zum Kopieren</div>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-inp" id="search-inp" type="search" placeholder="Suchen auf Deutsch, 日本語 oder Romaji…" oninput="filterPh()" onsearch="filterPh()">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <div id="ph-list"></div>
    </div>
  </div>

  <!-- Info View -->
  <div class="view" id="v-info">
    <div class="wrap" id="v-info-content"></div>
  </div>

  <!-- Karte View -->
  <div class="view" id="v-map">
    <div id="map-el"></div>
    <div class="map-legend">
      <div class="legend-row"><span class="legend-dot" style="background:#1a6fa8"></span>Stadt</div>
      <div class="legend-row"><span class="legend-dot" style="background:#e91e63"></span>★ Highlight</div>
      <div class="legend-row"><span class="legend-dot" style="background:#607d8b"></span>Sehenswürdigkeit</div>
      <div class="legend-row"><span style="font-size:13px;line-height:1">- -</span>&nbsp;Route</div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="nav">
  <button class="nav-btn on" id="nb-reise" onclick="showMain('reise')">
    <span class="nav-ico">🗺️</span>
    <span class="nav-lbl">Reise</span>
  </button>
  <button class="nav-btn" id="nb-cur" onclick="showMain('cur')">
    <span class="nav-ico">💴</span>
    <span class="nav-lbl">Währung</span>
  </button>
  <button class="nav-btn" id="nb-ph" onclick="showMain('ph')">
    <span class="nav-ico">🗣️</span>
    <span class="nav-lbl">Phrasen</span>
  </button>
  <button class="nav-btn" id="nb-info" onclick="showMain('info')">
    <span class="nav-ico">ℹ️</span>
    <span class="nav-lbl">Infos</span>
  </button>
  <button class="nav-btn" id="nb-map" onclick="showMain('map')">
    <span class="nav-ico">🗺️</span>
    <span class="nav-lbl">Karte</span>
  </button>
</nav>

<script>
// ─── Dark Mode ───────────────────────────────────────────────────────────────
var dm = localStorage.getItem('dm') === '1';
function applyDM() {
  document.documentElement.toggleAttribute('data-dark', dm);
  document.getElementById('dm-btn').textContent = dm ? '☀️' : '🌙';
  document.getElementById('tc').content = dm ? '#7a0015' : '#b5001f';
}
function toggleDM() { dm = !dm; localStorage.setItem('dm', dm ? '1' : '0'); applyDM(); }
applyDM();

// ─── Countdown ───────────────────────────────────────────────────────────────
(function () {
  var s = new Date('2026-07-20T00:00:00'), e = new Date('2026-08-06T00:00:00'), n = new Date();
  var el = document.getElementById('cd');
  if (n < s) {
    var d = Math.ceil((s - n) / 864e5);
    el.innerHTML = '🗓️ Noch <strong>' + d + ' Tag' + (d === 1 ? '' : 'e') + '</strong> bis zur Abreise';
    el.className = 'cd pre';
  } else if (n < e) {
    var day = Math.floor((n - s) / 864e5) + 1, pct = Math.round(day / 16 * 100);
    el.innerHTML = '✈️ <strong>Tag ' + day + '</strong> von 16 – Du bist in Japan!<div class="prog"><div class="prog-fill" style="width:' + pct + '%"></div></div>';
    el.className = 'cd act';
  } else {
    el.innerHTML = '🎌 Tolle Erinnerungen aus Japan!';
    el.className = 'cd done';
  }
})();

// ─── Data ────────────────────────────────────────────────────────────────────
var C = [
  { k: 'tokyo', e: '🗼', n: 'Tokyo', s: 'Ginza · Shibuya · Shinjuku', d: '20. – 25. Juli', ni: '5 Nächte', h: 'Quintessa Hotel Tokyo Ginza', col: '#1a6fa8', cl: '#d6eaf8', ll: [35.6762, 139.6503], ti: null, nt: '🚆 Odakyu Romancecar ab Shinjuku → Hakone (~85 Min., ca. 2.500 ¥)', a: [
    { n: 'Shibuya Scramble Crossing', d: 'Bis zu 3.000 Menschen gleichzeitig – einmalig. Tagsüber UND abends erleben – der Kontrast ist riesig!', t: ['★', '0¥'], ll: [35.6595, 139.7004] },
    { n: 'Shibuya Sky Observatorium', d: '237m hoch, beste 360°-Aussicht über Tokyo. Bei Sonnenuntergang Fuji-Sicht möglich.', t: ['★', '🎟', '📅'], ll: [35.6581, 139.7016] },
    { n: 'Meiji-Jingu Schrein', d: 'Ruhiger Shinto-Schrein in 70 ha Wald. Perfekter Kontrast zum Stadtlärm. Morgens besuchen!', t: ['0¥'], ll: [35.6763, 139.6993] },
    { n: 'Senso-ji Tempel (Asakusa)', d: 'Ältester Tempel Tokyos mit großem Torii-Tor. Früh morgens am ruhigsten.', t: ['★', '0¥'], ll: [35.7148, 139.7967] },

// ─── City Detail ─────────────────────────────────────────────────────────────
function openCity(k) {
  var c = C.find(function (x) { return x.k === k; });
  var att = c.a.map(function (a) {
    var tg = a.t.map(function (t) {
      var s = TAGS[t] || { bg: '#eee', c: '#555', lbl: t };
      return '<span class="tag" style="background:' + s.bg + ';color:' + s.c + '">' + s.lbl + '</span>';
    }).join('');
    return '<div class="att-card"><div class="att-name">' + a.n + '</div><div class="att-desc">' + a.d + '</div>' + (tg ? '<div class="tags">' + tg + '</div>' : '') + '</div>';
  }).join('');
  var tips = c.tp.map(function (t) { return '<div class="tip-card">💡 ' + t + '</div>'; }).join('');
  var tin = c.ti ? '<div class="sec"><div class="sec-hd">🚆 Anreise</div><div class="transit-card">' + c.ti + '</div></div>' : '';
  var tout = c.nt ? '<div class="sec"><div class="sec-hd">🚆 Weiterreise</div><div class="transit-card">' + c.nt + '</div></div>' : '';
  var ci = document.getElementById('v-ci');
  ci.innerHTML =
    '<div class="back-btn" onclick="showOV()">← Übersicht</div>' +
    '<div class="city-hero" style="background:' + c.col + '">' +
    '<div class="hero-emoji">' + c.e + '</div>' +
    '<div class="hero-name">' + c.n + '</div>' +
    '<div class="hero-sub">' + c.s + '</div>' +
    '<div class="hero-dates">' + c.d + ' · ' + c.ni + '</div>' +
    '<div class="hero-hotel">🏨 ' + c.h + '</div></div>' +
    tin +
    '<div class="sec"><div class="sec-hd">⭐ Sehenswürdigkeiten</div>' + att + '</div>' +
    '<div class="sec"><div class="sec-hd">💡 Insider-Tipps</div>' + tips + '</div>' +
    tout;
  document.getElementById('v-ov').classList.add('hidden');
  ci.classList.remove('hidden');
  document.querySelectorAll('.ctab').forEach(function (t) { t.classList.remove('on'); });
  var tab = document.getElementById('ct-' + k);
  if (tab) tab.classList.add('on');
  window.scrollTo(0, 0);
}

function cvCHF() {
  var v = parseFloat(document.getElementById('chf-i').value);
  document.getElementById('jpy-i').value = isNaN(v) ? '' : Math.round(v * RATE);
}
function cvJPY() {
  var v = parseFloat(document.getElementById('jpy-i').value);
  document.getElementById('chf-i').value = isNaN(v) ? '' : (v / RATE).toFixed(2);
}
function qc(chf) {
  document.getElementById('chf-i').value = chf;
  document.getElementById('jpy-i').value = Math.round(chf * RATE);
}
function swapCur() {
  var a = document.getElementById('chf-i').value, b = document.getElementById('jpy-i').value;
  document.getElementById('chf-i').value = b ? (parseFloat(b) / RATE).toFixed(2) : '';
  document.getElementById('jpy-i').value = a ? Math.round(parseFloat(a) * RATE) : '';
}

// Speech
var synth = window.speechSynthesis;
var curUtter = null;
var curBtn = null;

function speak(text, btn) {
  if (synth.speaking) { synth.cancel(); }
  if (curBtn && curBtn !== btn) { curBtn.classList.remove('playing'); curBtn.textContent = '🔊'; }
  if (curBtn === btn && !synth.speaking) { curBtn = null; return; }
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.8;
  u.pitch = 1.0;
  btn.classList.add('playing');
  btn.textContent = '⏸';
  curBtn = btn;
  curUtter = u;
  u.onend = u.onerror = function () {
    btn.classList.remove('playing');
    btn.textContent = '🔊';
    curBtn = null;
  };
  synth.speak(u);
}

function copyTxt(text, btn) {
  var done = function () {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(function () { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1400);
  };
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(done).catch(done); }
  else { try { var t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); } catch (e) {} done(); }
}

function renderPH(list) {
  var el = document.getElementById('ph-list');
  if (!list.length) { el.innerHTML = '<div class="no-results">🔍 Keine Treffer gefunden</div>'; return; }
  var html = '';
  list.forEach(function (item, idx) {
    if (item.isHd) { html += '<div class="ph-cat-hd">' + item.cat + '</div>'; return; }
    var id = 'ph' + idx;
    var jp = item.jp.replace(/'/g, "\\'");
    html += '<div class="ph-card">' +
      '<div class="ph-texts">' +
      '<div class="ph-de">' + item.de + '</div>' +
      '<div class="ph-jp">' + item.jp + '</div>' +
      '<div class="ph-rm">' + item.rm + '</div>' +
      '</div>' +
      '<div class="ph-actions">' +
      '<button class="play-btn" id="pb' + id + '" onclick="speak(\'' + jp + '\',this)" title="Abspielen">🔊</button>' +
      '<button class="copy-btn" id="cb' + id + '" onclick="copyTxt(\'' + jp + '\',this)" title="Kopieren">📋</button>' +
      '</div>' +
      '</div>';
  });
  el.innerHTML = html;
}

function buildPHList(q) {
  var items = [];
  PH.forEach(function (cat) {
    var filtered = cat.ph.filter(function (p) {
      if (!q) return true;
      var lq = q.toLowerCase();
      return p.de.toLowerCase().includes(lq) || p.jp.includes(q) || p.rm.toLowerCase().includes(lq);
    });
    if (filtered.length) {
      if (!q) items.push({ isHd: true, cat: cat.cat });
      filtered.forEach(function (p) { items.push(p); });
    }
  });
  return items;
}

renderPH(buildPHList(''));

function filterPh() {
  var q = document.getElementById('search-inp').value.trim();
  var clr = document.getElementById('search-clear');
  clr.style.display = q ? 'flex' : 'none';
  if (synth.speaking) { synth.cancel(); if (curBtn) { curBtn.classList.remove('playing'); curBtn.textContent = '🔊'; curBtn = null; } }
  renderPH(buildPHList(q));
}

function clearSearch() {
  document.getElementById('search-inp').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderPH(buildPHList(''));
}

// ─── PWA ─────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── Map ─────────────────────────────────────────────────────────────────────
var mapObj = null;

function resizeMap() {
  var hdr = document.getElementById('hdr').offsetHeight;
  var nav = document.querySelector('.nav').offsetHeight;
  var el = document.getElementById('map-el');
  el.style.height = (window.innerHeight - hdr - nav) + 'px';
  if (mapObj) mapObj.invalidateSize();
}

function initMap() {
  resizeMap();
  if (mapObj) { mapObj.invalidateSize(); return; }

  mapObj = L.map('map-el', { zoomControl: false, tap: false });
  L.control.zoom({ position: 'topright' }).addTo(mapObj);

  // Tile layer – OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(mapObj);

  // Route line
  L.polyline(C.map(function(c) { return c.ll; }), {
    color: '#b5001f', weight: 2.5, dashArray: '7,10', opacity: 0.65
  }).addTo(mapObj);

  // Attraction layer (shown when zoomed in)
  var attLayer = L.layerGroup().addTo(mapObj);

  C.forEach(function(c) {
    // City circle marker
    var cm = L.circleMarker(c.ll, {
      radius: 13, fillColor: c.col, color: '#fff',
      weight: 2.5, fillOpacity: 0.93
    }).addTo(mapObj);

    // Floating city label
    L.marker(c.ll, {
      icon: L.divIcon({
        html: '<div style="background:' + c.col + ';color:#fff;border-radius:14px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3);margin-left:18px;margin-top:-8px">' + c.e + ' ' + c.n + '</div>',
        className: '', iconAnchor: [0, 0]
      })
    }).addTo(mapObj);

    // City popup
    cm.bindPopup(
      '<div style="min-width:170px;font-family:-apple-system,sans-serif">' +
      '<div style="font-size:15px;font-weight:700;margin-bottom:3px">' + c.e + ' ' + c.n + '</div>' +
      '<div style="font-size:11px;color:#666;margin-bottom:2px">📅 ' + c.d + ' · ' + c.ni + '</div>' +
      '<div style="font-size:11px;color:#888;margin-bottom:10px">🏨 ' + c.h + '</div>' +
      '<button class="map-popup-btn" onclick="document.querySelector(\'.nav-btn\').click();openCity(\'' + c.k + '\');showMain(\'reise\')">Details ansehen →</button>' +
      '</div>'
    );

    // Attraction markers
    c.a.forEach(function(a) {
      if (!a.ll) return;
      var isHi = a.t.indexOf('★') >= 0;
      L.circleMarker(a.ll, {
        radius: isHi ? 7 : 5,
        fillColor: isHi ? '#e91e63' : '#607d8b',
        color: '#fff', weight: 1.5, fillOpacity: 0
      }).addTo(attLayer).bindPopup(
        '<div style="font-family:-apple-system,sans-serif">' +
        '<div style="font-size:12px;font-weight:700;margin-bottom:3px">' + a.n + '</div>' +
        '<div style="font-size:11px;color:#555;line-height:1.5">' + a.d + '</div>' +
        '</div>'
      );
    });
  });

  // Show/hide attraction pins based on zoom
  function updateAttVis() {
    var z = mapObj.getZoom();
    attLayer.eachLayer(function(l) {
      l.setStyle({ fillOpacity: z >= 11 ? (l.options.fillColor === '#e91e63' ? 0.9 : 0.7) : 0, opacity: z >= 11 ? 1 : 0 });
    });
  }
  mapObj.on('zoomend', updateAttVis);

  // Fit all cities
  mapObj.fitBounds(L.latLngBounds(C.map(function(c) { return c.ll; })), { padding: [40, 40] });
}

window.addEventListener('resize', function() { if (curMain === 'map') resizeMap(); });
</script>
</body>
